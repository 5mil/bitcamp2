name: Bitcamp Windows CI (Raylib)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows with Raylib
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-raylib
            curl

      - name: Download Raygui
        shell: msys2 {0}
        run: |
          curl -O https://raw.githubusercontent.com/raysan5/raygui/master/src/raygui.h

      - name: Build with MinGW64 + Raylib
        shell: msys2 {0}
        env:
          CFLAGS: "-I/mingw64/include -pthread"
          LDFLAGS: "-L/mingw64/lib -static -static-libgcc -static-libstdc++"
        run: |
          make

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-windows-x64
          path: ./bitcamp.exe
