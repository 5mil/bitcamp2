name: Bitcamp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev

      - name: Build
        run: |
          make

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-linux-x64
          path: ./bitcamp

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install ncurses

      - name: Build
        env:
          LDFLAGS: "-L/usr/local/opt/ncurses/lib"
          CPPFLAGS: "-I/usr/local/opt/ncurses/include"
        run: |
          make

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-macos-x64
          path: ./bitcamp

  build-windows:
    name: Build on Windows (MSYS2)
    env:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ncurses

      - name: Build with MinGW
  CFLAGS: "-Wall -Wextra -O2 -std=c11 -pthread -I/mingw64/include"
    LDFLAGS: "-lpthread -lncurses -lm -L/mingw64/lib"
        shell: msys2 {0}
        run: |
          mingw32-make

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-windows-x64
          path: ./bitcamp.exe
