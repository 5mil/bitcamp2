name: Build and Release Bitcamp

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: bitcamp
            artifact_name: bitcamp-linux-x64
          - os: macos-latest
            artifact: bitcamp
            artifact_name: bitcamp-macos-x64
          - os: windows-latest
            artifact: bitcamp.exe
            artifact_name: bitcamp-windows-x64.exe

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ncurses

      - name: Build
        run: make clean && make

      - name: Test binary exists
        run: |
          ls -lh bitcamp* || true

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bitcamp-linux-x64/bitcamp
            bitcamp-macos-x64/bitcamp
            bitcamp-windows-x64/bitcamp.exe
