name: Bitcamp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev

      - name: Build
        run: |
          make

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-linux-x64
          path: ./bitcamp

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install ncurses

      - name: Build
        env:
          LDFLAGS: "-L/usr/local/opt/ncurses/lib"
          CPPFLAGS: "-I/usr/local/opt/ncurses/include"
        run: |
          make

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-macos-x64
          path: ./bitcamp

    build-windows:
    name: Build on Windows (MSYS2 / MinGW64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-ncurses

      - name: Build with MinGW64
        shell: msys2 {0}
        env:
          CFLAGS: "-I/mingw64/include -I/mingw64/include/ncurses -I/mingw64/include/ncursesw"
          LDFLAGS: "-L/mingw64/lib"
        run: |
          make

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bitcamp-windows-x64
          path: ./bitcamp.exe
