name: bitcamp-ci

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install raylib (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libraylib-dev

      - name: Build (Linux)
        run: |
          make clean
          make

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-raylib

      - name: Build (Windows, MinGW64)
        run: |
          export PATH="/mingw64/bin:$PATH"
          make clean
          make
